# Minimal Judge0 configuration for local development.
# Full reference: https://github.com/judge0/judge0/blob/master/judge0.conf.example

# Postgres -------------------------------------------------------------
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_local_dev_password
DATABASE_HOST=db

# Redis ------------------------------------------------------------------
REDIS_HOST=redis
REDIS_PASSWORD=judge0_local_dev_redis_password

# Judge0 server ------------------------------------------------------------
RAILS_MAX_THREADS=10
MAX_QUEUE_SIZE=100

# Submission resource limits (also enforced per-request from Django;
# these are the server-side ceilings a request cannot exceed).
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=262144
STACK_LIMIT=65536
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true
MAX_FILE_SIZE=4096

# Auth (locks down the sandbox to only this app's backend — set the same
# value as JUDGE0_AUTH_TOKEN in backend/.env)
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=change-me-judge0-shared-secret

ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=true
ALLOWED_LANGUAGES_FOR_COMPILE_OPTIONS=
ENABLE_COMMAND_LINE_ARGUMENTS=true
ENABLE_SUBMISSION_DELETE=false

USE_DOCS_AS_HOMEPAGE=true
